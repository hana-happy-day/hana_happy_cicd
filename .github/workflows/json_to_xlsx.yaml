name: json_to_xlsx

on:
  push:
    branches: [master]

jobs:
  Running_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codes
        uses: actions/checkout@v5

      - name: json_to_xlsx
        run: |
          pip install openpyxl
          python .github/workflows/json_to_xlsx.py

      
      - name: Upload Excel
        uses: actions/upload-artifact@v4
        with:
          name: excel-result
          path: "*.xlsx"